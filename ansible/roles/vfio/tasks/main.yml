---
# Proxmox boot matrix: proxmox-boot-tool systems sync ESPs via `refresh`
# (systemd-boot variant reads /etc/kernel/cmdline, GRUB variant reads
# /etc/default/grub); plain-GRUB systems need `update-grub`. Set whichever
# files exist and trigger the right refresher.
- name: Detect proxmox-boot-tool managed boot
  ansible.builtin.stat:
    path: /etc/kernel/proxmox-boot-uuids
  register: pbt_uuids

- name: Detect /etc/kernel/cmdline
  ansible.builtin.stat:
    path: /etc/kernel/cmdline
  register: kernel_cmdline

- name: Detect /etc/default/grub
  ansible.builtin.stat:
    path: /etc/default/grub
  register: grub_default

- name: Ensure IOMMU options in /etc/kernel/cmdline
  ansible.builtin.lineinfile:
    path: /etc/kernel/cmdline
    regexp: '^(.*?)(\s+amd_iommu=on)?(\s+iommu=pt)?\s*$'
    line: "\\1 {{ kernel_cmdline_opts }}"
    backrefs: true
  when: kernel_cmdline.stat.exists
  notify: Refresh proxmox boot

- name: Ensure IOMMU options in GRUB cmdline (proxmox-boot-tool ESPs)
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    regexp: '^GRUB_CMDLINE_LINUX_DEFAULT='
    line: 'GRUB_CMDLINE_LINUX_DEFAULT="quiet {{ kernel_cmdline_opts }}"'
  when: grub_default.stat.exists and pbt_uuids.stat.exists
  notify: Refresh proxmox boot

- name: Ensure IOMMU options in GRUB cmdline (plain GRUB)
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    regexp: '^GRUB_CMDLINE_LINUX_DEFAULT='
    line: 'GRUB_CMDLINE_LINUX_DEFAULT="quiet {{ kernel_cmdline_opts }}"'
  when: grub_default.stat.exists and not pbt_uuids.stat.exists
  notify: Update grub

- name: Load vfio modules at boot
  ansible.builtin.copy:
    dest: /etc/modules-load.d/vfio.conf
    content: |
      vfio
      vfio_iommu_type1
      vfio_pci
    mode: "0644"
  notify: Update initramfs

- name: Bind target devices to vfio-pci by ID
  ansible.builtin.copy:
    dest: /etc/modprobe.d/vfio.conf
    content: |
      options vfio-pci ids={{ vfio_pci_ids }}
      softdep nvidia pre: vfio-pci
      softdep nouveau pre: vfio-pci
    mode: "0644"
  notify: Update initramfs

- name: Blacklist host GPU drivers so they never grab the cards
  ansible.builtin.copy:
    dest: /etc/modprobe.d/blacklist-gpu.conf
    content: |
      blacklist nouveau
      blacklist nvidia
      blacklist nvidiafb
      blacklist snd_hda_intel
    mode: "0644"
  notify: Update initramfs
