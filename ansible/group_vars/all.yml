---
# Include BOTH the GPU function AND its HDMI-audio function for each card.
# RTX 5080 + its audio fn (only GPU installed as of 2026-06-11; append the
# 3080's pair when that card goes in).
vfio_pci_ids: "10de:2c02,10de:22e9"

# Sudo-capable admin users (passwords set out-of-band, never committed).
admin_users:
  - dib      # Penn
  - stilgar  # on-site friend
penn_ssh_pubkey: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIA6znTfAPIcKX9TYD2UQBWQqJL1paLev6gSzKGB/IoRV lushfund@protonmail.ch"

# Kernel cmdline additions for IOMMU + passthrough.
kernel_cmdline_opts: "amd_iommu=on iommu=pt"

# ZFS ARC cap in bytes (~8 GiB) so ARC does not starve VM RAM.
zfs_arc_max_bytes: 8589934592

# Tailscale auth key — DO NOT COMMIT. Pass at runtime:
#   ansible-playbook site.yml -e "tailscale_authkey=tskey-..."
tailscale_authkey: ""

# apcupsd: APC SMT1500C (SmartConnect) over USB modbus.
ups_name: apc
ups_shutdown_battery_pct: 30
ups_shutdown_minutes_left: 10
